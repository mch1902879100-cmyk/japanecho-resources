name: Publish Japanecho Resources

on:
  workflow_dispatch:
  push:
    tags:
      - "resources-v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            resources.json
            packs/*.jepack
          generate_release_notes: true
